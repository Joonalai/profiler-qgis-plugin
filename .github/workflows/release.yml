# Inspired by https://docs.astral.sh/uv/guides/integration/github/#publishing-to-pypi

name: Release & publish
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build --all-packages
      - name: Publish
        run: uv publish

  qgis:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components/plugin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      - run: |
          qgis-plugin-dev-tools build
      - run: |
          qgis-plugin-dev-tools publish dist/*.zip
        env:
          QPDT_PUBLISH_USERNAME: ${{ secrets.QGIS_REPO_USERNAME }}
          QPDT_PUBLISH_PASSWORD: ${{ secrets.QGIS_REPO_PASSWORD }}
      - uses: svenstaro/upload-release-action@2.9.0
        with:
          file: dist/*
          file_glob: true
