# Inspired by https://docs.astral.sh/uv/guides/integration/github/#publishing-to-pypi

name: Release & publish
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build --all-packages
      - name: Publish to PyPI
        run: uv publish

      - name: Build and publish QGIS Plugin
        run: |
          cd components/plugin
          uv sync --all-packages --no-editable
          uv run --no-editable qgis-plugin-dev-tools build
          uv run --no-editable qgis-plugin-dev-tools publish dist/*.zip
        env:
          QPDT_PUBLISH_USERNAME: ${{ secrets.QGIS_REPO_USERNAME }}
          QPDT_PUBLISH_PASSWORD: ${{ secrets.QGIS_REPO_PASSWORD }}

      - name: Collect all release assets
        run: cp components/plugin/dist/*.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
