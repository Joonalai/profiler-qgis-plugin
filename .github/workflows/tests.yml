name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    container:
      image: qgis/qgis:${{ matrix.qgis-image-tags }}
    strategy:
      matrix:
        qgis-image-tags: ["3.40-noble", "3.44-noble"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 -m venv --system-site-packages .venv
          source .venv/bin/activate
          python3 -m pip install -q -U uv
          uv sync --all-packages --all-groups --active

      - name: Run tests
        run: |
          uv run pytest -v --qgis_disable_gui --cov --cov-branch --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage reports to Codecov
        if: ${{ matrix.qgis-image-tags == 'latest' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Joonalai/profiler-qgis-plugin
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.qgis-image-tags == 'latest' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
