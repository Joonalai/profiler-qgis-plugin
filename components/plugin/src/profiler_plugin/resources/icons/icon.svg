<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="48"
   height="48"
   viewBox="0 0 48 48"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">

  <!-- Top button -->
  <rect x="21.5" y="2" width="5" height="4" rx="1.5" fill="#4a4a4a"/>

  <!-- Side button -->
  <rect x="35" y="9" width="4" height="3" rx="1" fill="#4a4a4a" transform="rotate(30 37 10.5)"/>
  <line x1="35.5" y1="12.5" x2="33" y2="15" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Watch body (outer ring) -->
  <circle cx="24" cy="26" r="18" fill="#f5f5f5" stroke="#4a4a4a" stroke-width="2.5"/>

  <!-- Inner circle -->
  <circle cx="24" cy="26" r="15" fill="none" stroke="#ddd" stroke-width="0.5"/>

  <!-- Hour marks -->
  <line x1="24" y1="10" x2="24" y2="13" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="39" x2="24" y2="42" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="26" x2="11" y2="26" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="26" x2="40" y2="26" stroke="#4a4a4a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Minor tick marks -->
  <line x1="16.7" y1="14.7" x2="18.2" y2="16.2" stroke="#4a4a4a" stroke-width="1" stroke-linecap="round"/>
  <line x1="31.3" y1="14.7" x2="29.8" y2="16.2" stroke="#4a4a4a" stroke-width="1" stroke-linecap="round"/>
  <line x1="16.7" y1="37.3" x2="18.2" y2="35.8" stroke="#4a4a4a" stroke-width="1" stroke-linecap="round"/>
  <line x1="31.3" y1="37.3" x2="29.8" y2="35.8" stroke="#4a4a4a" stroke-width="1" stroke-linecap="round"/>

  <!-- Elapsed time arc (accent color) -->
  <path d="M 24 10 A 16 16 0 1 1 9.2 20"
        fill="none" stroke="#2d7dd2" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Second hand -->
  <line x1="24" y1="26" x2="24" y2="12" stroke="#d94040" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Minute hand -->
  <line x1="24" y1="26" x2="13" y2="21" stroke="#4a4a4a" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="24" cy="26" r="2" fill="#d94040"/>
  <circle cx="24" cy="26" r="1" fill="#f5f5f5"/>


</svg>
